<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Columns Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        .column {
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            padding: 10px;
            max-width: 300px;
        }
        .name {
            font-weight: bold;
        }
        .link-button {
            padding: 10px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            margin-top: 10px;
        }
        .link-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="column">
        <div class="name">User 1</div>
        <a href="#" class="link-button">Link 1</a>
    </div>
    <div class="column">
        <div class="name">User 2</div>
        <a href="#" class="link-button">Link 2</a>
    </div>
    <div class="column">
        <div class="name">User 3</div>
        <a href="#" class="link-button">Link 3</a>
    </div>
</body>
</html>
