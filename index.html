<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSign Repo - Anti-Khoindvn Edition</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-bright: #ffffff;
            --link-blue: #58a6ff;
            --accent-red: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* The Drama Header */
        .header-box {
            border: 1px solid var(--accent-red);
            background-color: rgba(248, 81, 73, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .header-box h2 { color: var(--text-bright); margin: 0 0 10px 0; }
        .header-box p { font-style: italic; color: #8b949e; margin-bottom: 20px; }

        .btn-dns {
            display: inline-block;
            background: var(--link-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Grid Layout for Columns */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center; /* Side-by-side style like your screenshots */
            gap: 15px;
            transition: 0.2s;
        }

        .card:hover { border-color: #8b949e; background: #1c2128; }

        .card img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
        }

        .card-info { flex-grow: 1; overflow: hidden; }

        .card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card p {
            margin: 2px 0 0 0;
            font-size: 0.7rem;
            color: #8b949e;
        }

        .install-btn {
            background-color: #21262d;
            color: var(--link-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .install-btn:hover { background: var(--link-blue); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>System Update</h2>
        <p>"This is for the DNS Profile, and the Ksigns since Khoindvn acting funny."</p>
        <a href="YOUR_DNS_URL" class="btn-dns">DOWNLOAD DNS PROFILE</a>
    </div>

    <h2 style="color: white; margin-bottom: 20px;">All KSign Versions</h2>
    
    <div class="app-grid" id="app-list"></div>
</div>

</body>
</html>
